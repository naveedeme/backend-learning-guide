name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy PWA to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify PWA assets
        run: |
          echo "=== All files ==="
          find . -not -path './.git/*' | sort
          echo ""
          echo "=== Screenshot dimensions ==="
          python3 -c "
          from PIL import Image
          for f in ['assets/screenshots/screenshot-wide.png','assets/screenshots/screenshot-narrow.png']:
              try:
                  img = Image.open(f)
                  print(f'{f}: {img.size}')
              except Exception as ex:
                  print(f'{f}: ERROR {ex}')
          " || echo "Pillow not available — skipping dimension check"
          echo ""
          echo "=== Manifest ==="
          cat manifest.json

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
